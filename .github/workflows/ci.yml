name: CI (PR checks)

on:
  pull_request:
    branches: ["dev", "main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./ci.db
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci_dummy_secret_32_bytes_minimum_123456
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build